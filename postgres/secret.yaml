# IMPORTANTE: Los valores deben estar en base64.
# Para codificar: echo -n "tu-valor" | base64
#
# Ejemplo:
#   echo -n "postgres" | base64    → cG9zdGdyZXM=
#   echo -n "Admin123!" | base64   → QWRtaW4xMjMh
#   echo -n "gestion_proyectos" | base64 → Z2VzdGlvbl9wcm95ZWN0b3M=

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: gestion-proyectos
type: Opaque
data:
  POSTGRES_USER: cG9zdGdyZXM=        # postgres
  POSTGRES_PASSWORD: QWRtaW4xMjMh    # Admin123!  ← CAMBIA ESTO
  POSTGRES_DB: Z2VzdGlvbl9wcm95ZWN0b3M=  # gestion_proyectos
